name: 采集国家队 ETF 数据

on:
  schedule:
    # GitHub Actions 定时为 UTC 且"尽力而为"：整点前后(尤其 :00/:00-:05)是全球 cron 高峰，
    # 排队任务可能被延迟甚至直接丢弃。故避开整点，选偏门分钟以提高实际触发率。
    # 北京 09:23 = UTC 01:23（错开整点拥堵）。另加一个 09:53 = UTC 01:53 作兜底，
    # 两次都为幂等 daily，先跑到的那次产出数据、后一次无实质变化仅心跳。
    - cron: "23 1 * * *"
    - cron: "53 1 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "采集模式：daily=每日增量；init=初始化/全量"
        type: choice
        default: daily
        options: [daily, init]
      start:
        description: "init 模式的起始日 YYYY-MM-DD（留空用默认）"
        required: false
        default: ""

# 避免上一次未跑完又触发下一次
concurrency:
  group: collect
  cancel-in-progress: false

permissions:
  contents: write   # 需要把生成的 JSON 提交回仓库

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install -r collector/requirements.txt

      - name: 运行采集
        run: |
          if [ "${{ github.event.inputs.mode }}" = "init" ]; then
            if [ -n "${{ github.event.inputs.start }}" ]; then
              echo "手动初始化：起始 ${{ github.event.inputs.start }}"
              python collector/init.py --start "${{ github.event.inputs.start }}"
            else
              echo "手动初始化：默认起始"
              python collector/init.py
            fi
          else
            # 每日增量：脚本内部会自动检测新报告期，有则自动升级初始化
            python collector/daily.py
          fi
          # 个股国家队直接持股(季度口径)：每日跑增量(只补最近报告期)，捕捉新季报
          python collector/stock_daily.py || echo "个股采集失败(不阻断)"

      - name: 提交数据变更
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 运行期间远端可能被其他推送领先(并发/手动提交) → 推送前先 rebase，并重试，避免 non-fast-forward 失败
          push_data() {
            for i in 1 2 3 4 5; do
              if git fetch origin main && git rebase origin/main; then
                if git push origin HEAD:main; then echo "推送成功(第 $i 次)"; return 0; fi
              else
                git rebase --abort 2>/dev/null || true
              fi
              echo "推送冲突/失败，重试 $i ..."; sleep $((i*3))
            done
            echo "::error::多次重试后仍推送失败"; return 1
          }
          git add docs/data
          TS=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')
          # 实质数据 = 排除每次必变的 meta.json / status.json / runs/(日志)后是否有变化
          if ! git diff --cached --quiet -- docs/data ':(exclude)docs/data/meta.json' ':(exclude)docs/data/stock/meta.json' ':(exclude)docs/data/status.json' ':(exclude)docs/data/runs/**'; then
            git commit -m "chore(data): 自动更新国家队数据 ${TS} (北京时间)"
            push_data
          elif ! git diff --cached --quiet -- docs/data/status.json docs/data/runs; then
            # 无实质数据变化(非交易日等) → 仅提交状态/日志心跳,便于网页展示当天采集情况
            git commit -m "chore(status): 采集状态心跳 ${TS} (无数据变化)"
            push_data
          else
            echo "无任何变化，跳过提交"
            git reset -q
          fi
